<div class="content-container">
  <div class="content-area">
    <h2>Inventory</h2>

    <!-- Loading Spinner (only shown on initial load before any items are present) -->
    <clr-spinner *ngIf="loading && items.length === 0"></clr-spinner>

    <!-- Error Alert -->
    <clr-alert *ngIf="error" clrAlertType="danger" [clrAlertClosable]="false">
      <clr-alert-item>
        <span class="alert-text">{{ error }}</span>
      </clr-alert-item>
    </clr-alert>

    <!-- Advance Day Button -->
    <div class="action-bar" *ngIf="!loading">
      <button clrButton (click)="advanceDay()" [disabled]="advancing">
        Advance Day
      </button>
    </div>

    <!-- Datagrid -->
    <!-- clrDgLoading is used instead of hiding the datagrid during reloads.
         Keeping the datagrid in the DOM prevents Clarity from re-initializing it
         and firing clrDgRefresh with a null sort state, which would cause a
         duplicate unsorted API request after a sort-triggered reload. -->
    <clr-datagrid *ngIf="items.length > 0 && !error" [clrDgLoading]="loading" (clrDgRefresh)="onDatagridRefresh($event)">
      <clr-dg-column [clrDgSortBy]="'name'">Name</clr-dg-column>
      <clr-dg-column [clrDgSortBy]="'sellIn'">Sell In</clr-dg-column>
      <clr-dg-column [clrDgSortBy]="'quality'">Quality</clr-dg-column>
      <clr-dg-column>Price</clr-dg-column>

      <clr-dg-row *ngFor="let item of items" [ngClass]="{ 'text-danger': item.sellIn <= 0 }">
        <clr-dg-cell>{{ item.name }}</clr-dg-cell>
        <clr-dg-cell>{{ item.sellIn }}</clr-dg-cell>
        <clr-dg-cell>{{ item.quality }}</clr-dg-cell>
        <clr-dg-cell>{{ item.price | currency }}</clr-dg-cell>
      </clr-dg-row>
    </clr-datagrid>
  </div>
</div>
