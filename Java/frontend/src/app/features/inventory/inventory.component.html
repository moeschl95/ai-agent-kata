<div class="content-container">
  <div class="content-area">
    <h2>Inventory</h2>

    <!-- Loading Spinner -->
    <clr-spinner *ngIf="loading"></clr-spinner>

    <!-- Error Alert -->
    <clr-alert *ngIf="error" clrAlertType="danger" [clrAlertClosable]="false">
      <clr-alert-item>
        <span class="alert-text">{{ error }}</span>
      </clr-alert-item>
    </clr-alert>

    <!-- Advance Day Button -->
    <div class="action-bar" *ngIf="!loading">
      <button clrButton (click)="advanceDay()" [disabled]="advancing">
        Advance Day
      </button>
    </div>

    <!-- Datagrid -->
    <clr-datagrid *ngIf="!loading && !error && items.length > 0" (clrDgRefresh)="onDatagridRefresh($event)">
      <clr-dg-column [clrDgSortBy]="'name'">Name</clr-dg-column>
      <clr-dg-column [clrDgSortBy]="'sellIn'">Sell In</clr-dg-column>
      <clr-dg-column [clrDgSortBy]="'quality'">Quality</clr-dg-column>
      <clr-dg-column>Price</clr-dg-column>

      <clr-dg-row *ngFor="let item of items" [ngClass]="{ 'text-danger': item.sellIn <= 0 }">
        <clr-dg-cell>{{ item.name }}</clr-dg-cell>
        <clr-dg-cell>{{ item.sellIn }}</clr-dg-cell>
        <clr-dg-cell>{{ item.quality }}</clr-dg-cell>
        <clr-dg-cell>{{ item.price | currency }}</clr-dg-cell>
      </clr-dg-row>
    </clr-datagrid>
  </div>
</div>
