<div class="content-container">
  <div class="content-area">
    <h2>Inventory</h2>

    <!-- Loading Spinner -->
    <clr-spinner *ngIf="loading"></clr-spinner>

    <!-- Error Alert -->
    <clr-alert *ngIf="error" clrAlertType="danger" [clrAlertClosable]="false">
      <clr-alert-item>
        <span class="alert-text">{{ error }}</span>
      </clr-alert-item>
    </clr-alert>

    <!-- Datagrid -->
    <clr-datagrid *ngIf="!loading && !error && items.length > 0">
      <clr-dg-column>Name</clr-dg-column>
      <clr-dg-column>Sell In</clr-dg-column>
      <clr-dg-column>Quality</clr-dg-column>

      <clr-dg-row *ngFor="let item of items" [ngClass]="{ 'text-danger': item.sellIn <= 0 }">
        <clr-dg-cell>{{ item.name }}</clr-dg-cell>
        <clr-dg-cell>{{ item.sellIn }}</clr-dg-cell>
        <clr-dg-cell>{{ item.quality }}</clr-dg-cell>
      </clr-dg-row>
    </clr-datagrid>
  </div>
</div>
