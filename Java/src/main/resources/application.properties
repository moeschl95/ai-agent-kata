gilded-rose.legendary-price=999
gilded-rose.expired-discount-rate=0.5
gilded-rose.base-prices.aged-brie=50
gilded-rose.base-prices.backstage-pass=80
gilded-rose.base-prices.conjured-mana-cake=25
gilded-rose.base-prices.sulfuras=999
gilded-rose.base-prices.normal-item=20

# H2 in-memory database configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=false

# OpenAPI / Springdoc configuration
springdoc.api-docs.path=/v3/openapi.json
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# To switch from H2 in-memory to MariaDB, replace the block above with:
# spring.datasource.url=jdbc:mariadb://localhost:3306/gildedrose
# spring.datasource.username=<user>
# spring.datasource.password=<password>
# spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
# spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
# spring.jpa.hibernate.ddl-auto=validate
# and add mariadb-java-client to dependencies.
